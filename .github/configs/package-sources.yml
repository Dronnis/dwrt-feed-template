# .github/configs/package-sources.yml

# Настройки системы защиты и очередей
protection:
  max_parallel_per_group: 5    # Максимум одновременных задач в одной группе
  max_retries: 2               # Количество попыток при ошибке
  retry_delay_base: 2          # Базовая задержка перед повтором (сек)
  timeout_minutes: 5           # Таймаут на одну операцию клонирования

# Группы источников (выполняются последовательно по приоритету)
groups:
  # === ГРУППА 1: CRITICAL (Самые важные/базовые пакеты) ===
  - name: critical
    priority: 1
    sources:
      - { owner: kiddin9, repo: my-packages, post_move: true }
      - { owner: kiddin9, repo: openwrt-bypass, post_move: true }
      - { owner: Openwrt-Passwall, repo: openwrt-passwall, post_move: true }
      - { owner: Openwrt-Passwall, repo: openwrt-passwall-packages, post_move: true }

  # === ГРУППА 2: MAIN (Основные популярные приложения kiddin9) ===
  - name: main
    priority: 2
    sources:
      - { owner: kiddin9, repo: luci-app-dnsfilter }
      - { owner: kiddin9, repo: aria2 }
      - { owner: kiddin9, repo: luci-theme-edge }
      - { owner: kiddin9, repo: luci-app-xlnetacc }
      - { owner: kiddin9, repo: luci-app-wizard }
      - { owner: kiddin9, repo: luci-app-adguardhome }
      - { owner: kiddin9, repo: luci-app-cloudreve }
      - { owner: kiddin9, repo: openwrt-filebrowser, post_move: true }
      - { owner: kiddin9, repo: openwrt-netdata, target: netdata }
      - { owner: kiddin9, repo: luci-app-syscontrol }
      - { owner: kiddin9, repo: luci-app-chinadns-ng }
      - { owner: kiddin9, repo: openwrt-my-dnshelper, post_move: true }
      - { owner: kiddin9, repo: openwrt-lingtigameacc, post_move: true }
      - { owner: kiddin9, repo: luci-app-vsftpd }
      - { owner: kiddin9, repo: openwrt-subconverter, post_move: true }
      - { owner: kiddin9, repo: luci-app-syncdial }

  # === ГРУППА 3: SIRPDBOY (Пакеты от sirpdboy) ===
  - name: sirpdboy
    priority: 3
    sources:
      - { owner: sirpdboy, repo: luci-app-advancedplus }
      - { owner: sirpdboy, repo: luci-app-taskplan, target: taskplan, post_move: true }
      - { owner: sirpdboy, repo: luci-app-lucky, target: oplucky, post_move: true }
      - { owner: sirpdboy, repo: luci-app-partexp, target: partexp, post_move: true }
