    - name: tencentcloud-cos
      url: https://github.com/Tencent-Cloud-Plugins/tencentcloud-openwrt-plugin-cos
      custom_action: mv -n tencentcloud-openwrt-plugin-cos/tencentcloud_cos ./luci-app-tencentcloud-cos && rm -rf tencentcloud-openwrt-plugin-cos
    - name: luci-app-shortcutmenu
      url: https://github.com/doushang/luci-app-shortcutmenu
      target_dir: luci-shortcutmenu
      custom_action: mv -n luci-shortcutmenu/luci-app-shortcutmenu ./ && rm -rf luci-shortcutmenu
    - name: openwrt-dist-luci
      url: https://github.com/aa65535/openwrt-dist-luci

