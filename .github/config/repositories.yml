# ============================================
# ПОЛНАЯ КОНФИГУРАЦИЯ ВСЕХ РЕПОЗИТОРИЕВ
# ============================================

settings:
  timezone: "Asia/Shanghai"
  git_user_email: "github-actions[bot]@users.noreply.github.com"
  git_user_name: "github-actions[bot]"
  parallel_jobs: 4

# ============================================
# РЕПОЗИТОРИИ
# ============================================

repositories:
  # 1. KIDDIN9 ОСНОВНЫЕ
  kiddin9_core:
    - name: my-packages
      url: https://github.com/kiddin9/my-packages
      action: mvdir
    - name: openwrt-bypass
      url: https://github.com/kiddin9/openwrt-bypass
      action: mvdir
    - name: luci-app-dnsfilter
      url: https://github.com/kiddin9/luci-app-dnsfilter
    - name: aria2
      url: https://github.com/kiddin9/aria2
    - name: luci-theme-edge
      url: https://github.com/kiddin9/luci-theme-edge
    - name: luci-app-xlnetacc
      url: https://github.com/kiddin9/luci-app-xlnetacc
    - name: luci-app-wizard
      url: https://github.com/kiddin9/luci-app-wizard
    - name: luci-app-adguardhome
      url: https://github.com/kiddin9/luci-app-adguardhome
    - name: luci-app-cloudreve
      url: https://github.com/kiddin9/luci-app-cloudreve
    - name: openwrt-filebrowser
      url: https://github.com/kiddin9/openwrt-filebrowser
      action: mvdir
    - name: openwrt-netdata
      url: https://github.com/kiddin9/openwrt-netdata
      target_dir: netdata
    - name: luci-app-syscontrol
      url: https://github.com/kiddin9/luci-app-syscontrol
    - name: luci-app-chinadns-ng
      url: https://github.com/kiddin9/luci-app-chinadns-ng
    - name: openwrt-my-dnshelper
      url: https://github.com/kiddin9/openwrt-my-dnshelper
      action: mvdir
    - name: openwrt-lingtigameacc
      url: https://github.com/kiddin9/openwrt-lingtigameacc
      action: mvdir
    - name: luci-app-vsftpd
      url: https://github.com/kiddin9/luci-app-vsftpd
    - name: openwrt-subconverter
      url: https://github.com/kiddin9/openwrt-subconverter
      action: mvdir
    - name: luci-app-syncdial
      url: https://github.com/kiddin9/luci-app-syncdial

  # 2. PASSWALL
  passwall:
    - name: openwrt-passwall
      url: https://github.com/Openwrt-Passwall/openwrt-passwall
      action: mvdir
    - name: openwrt-passwall-packages
      url: https://github.com/Openwrt-Passwall/openwrt-passwall-packages
      action: mvdir
    - name: openwrt-passwall2
      url: https://github.com/Openwrt-Passwall/openwrt-passwall2
      target_dir: passwall2
      custom_action: mv passwall2/luci-app-passwall2 ./ && rm -rf passwall2

  # 3. HELLOWORLD
  helloworld:
    - name: helloworld
      url: https://github.com/fw876/helloworld
      action: mvdir

  # 4. LIENOL
  lienol:
    - name: openwrt-package
      url: https://github.com/Lienol/openwrt-package
      target_dir: liep
      post_process: rm -rf liep/other

  # 5. ПРОКСИ И УТИЛИТЫ
