# ============================================
# ПОСТ-ОБРАБОТКА
# ============================================
post_processing:
  delete_duplicates:
    - source: luciapp
      action: mv_to_root
    - source: lean
      action: mv_to_root
    - source: istore-packages
      action: mv_to_root

  sed_replacements:
    - pattern: "\\(network\\..*\\)\\.ifname"
      replacement: "\\1.device"
      paths: ["*/root/*", "*/files/*", "*/luasrc/*"]
    - pattern: "killall \\([^-]+*\\)"
      replacement: "killall -3 \\1"
      paths: ["*/files/root/etc/init.d/*", "*/root/etc/init.d/*"]