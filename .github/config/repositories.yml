      url: https://github.com/rufengsuixing/luci-app-autoipsetadder
    - name: luci-app-beardropper
      url: https://github.com/NateLol/luci-app-beardropper
    - name: openwrt-iptvhelper
      url: https://github.com/riverscn/openwrt-iptvhelper
      action: mvdir
