      action: mvdir
    - name: luci-app-partexp
      url: https://github.com/sirpdboy/luci-app-partexp
      target_dir: partexp
      action: mvdir
    - name: netspeedtest
      url: https://github.com/sirpdboy/netspeedtest
      target_dir: speedtest
      action: mvdir
    - name: luci-app-parentcontrol
      url: https://github.com/sirpdboy/luci-app-parentcontrol
    - name: luci-app-poweroffdevice
      url: https://github.com/sirpdboy/luci-app-poweroffdevice
      target_dir: poweroffdevice
      action: mvdir
    - name: luci-app-watchdog
      url: https://github.com/sirpdboy/luci-app-watchdog
      target_dir: watchdog1
      action: mvdir
    - name: luci-app-cupsd
      url: https://github.com/sirpdboy/luci-app-cupsd
      target_dir: cupsd1
      custom_action: mv -n cupsd1/{luci-app-cupsd,cups} ./ && rm -rf cupsd1
    - name: luci-app-timecontrol
      url: https://github.com/sirpdboy/luci-app-timecontrol
      target_dir: timecontrol
      action: mvdir
    - name: luci-theme-kucat
      url: https://github.com/sirpdboy/luci-theme-kucat
    - name: luci-app-kucat-config
      url: https://github.com/sirpdboy/luci-app-kucat-config
    - name: luci-app-chatgpt-web
      url: https://github.com/sirpdboy/luci-app-chatgpt-web
    - name: luci-app-eqosplus
      url: https://github.com/sirpdboy/luci-app-eqosplus
    - name: luci-app-netdata
      url: https://github.com/sirpdboy/luci-app-netdata
      target_dir: lucinetdata
      custom_action: mv lucinetdata/luci-app-netdata ./ && rm -rf lucinetdata

