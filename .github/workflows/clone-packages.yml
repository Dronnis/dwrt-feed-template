name: Clone-Packages
on:
  workflow_call:
    inputs:
      config_path: 
        required: true 
        type: string
      token: 
        required: true 
        type: string
      ssh_enabled: 
        required: false 
        type: boolean 
        default: false
      enable_timing: 
        required: false 
        type: boolean 
        default: true
    outputs:
      packages_count: 
        value: ${{ jobs.clone.outputs.packages_count }}

jobs:
  clone:
    runs-on: ubuntu-latest
    outputs:
      packages_count: ${{ steps.clone.outputs.total_ok }}
    
    steps:
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0
          
      - uses: de-vri-es/setup-git-credentials@v2
        with: 
          credentials: https://Dronnis:${{ inputs.token }}@github.com/
          
      - run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global advice.detachedHead false

      - name: Merge & Validate Sources
        id: prep
        env: 
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          python3 -c "import yaml; yaml.safe_load(open('${{ inputs.config_path }}'))"
          python3 .github/scripts/merge-sources.py > /tmp/merged.json
          echo "sources_json<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/merged.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Clone with Protection & Timing
        id: clone
        run: |
          chmod +x .github/scripts/*.sh
          source .github/scripts/timing.sh
          init_metrics
          start_timer "clone_repos"
          export MAX_PARALLEL_PER_GROUP=5 MAX_RETRIES=2 RETRY_DELAY_BASE=2 CLONE_TIMEOUT_MIN=5
          bash .github/scripts/clone-manager.sh '${{ steps.prep.outputs.sources_json }}'
          end_timer "clone_repos"
          print_summary
          export_to_github

      - name: Cleanup & Report
        if: always()
        run: |
          find . -type d -name ".git" -exec rm -rf {} + 2>/dev/null || true
          chmod +x .github/scripts/generate_report.sh
          export TG_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
          export TG_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          bash .github/scripts/generate_report.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with: 
          name: clone-metrics-${{ github.run_number }}
          path: /tmp/*.log
          retention-days: 5
      
      - uses: kiddin9/debugger-action@master
        if: ${{ inputs.ssh_enabled == true }}