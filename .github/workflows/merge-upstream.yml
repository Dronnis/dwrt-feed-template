name: Merge-upstream

on:
  push:
    paths:
      - '.github/workflows/merge-upstream.yml'
      - '.github/config/**'
      - '.github/scripts/**'
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    # Добавляем правильные права доступа
    permissions:
      contents: write
      actions: write  # Для удаления workflow runs
      
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id
    
    
    steps:
    - name: Checkout
      uses: actions/checkout@main
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq moreutils
        pip3 install pyyaml

    - name: Setup Git credentials
      uses: de-vri-es/setup-git-credentials@v2
      with:
        credentials: https://Dronnis:${{ secrets.TOKEN }}@github.com/

    - name: Run merge manager
      run: |
        chmod +x .github/scripts/*.sh
        .github/scripts/merge-manager.sh

    - name: Commit and push changes
      run: |
        cd "$GITHUB_WORKSPACE"
        
        # Проверяем, что .git существует
        if [ ! -d ".git" ]; then
          echo "❌ ERROR: .git directory not found!"
          exit 1
        fi
        
        # Добавляем все изменения
        git add .
        
        # Проверяем, есть ли изменения для коммита
        if git diff --cached --quiet; then
          echo "ℹ️ No changes to commit"
        else
          echo "📝 Changes detected, committing..."
          git status --short
          Emojis=("🎉" "🤞" "✨" "🎁" "🎈" "🎄" "🚀" "🌈" "🔥" "🦄")
          git commit -m "${Emojis[$RANDOM % ${#Emojis[@]}]} Sync $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "✅ Changes pushed successfully"
        fi

    - name: Cleanup workflow runs
      uses: Mattraks/delete-workflow-runs@main
      continue-on-error: true
      with:
        retain_days: 1
        keep_minimum_runs: 3
        token: ${{ secrets.TOKEN }}