name: Merge-upstream

on:
  push:
    paths:
      - '.github/workflows/merge-upstream.yml'
      - '.github/config/**'
      - '.github/scripts/**'
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH'
        required: false
        default: 'false'

jobs:
  merge:
    runs-on: ubuntu-latest
    # Добавляем правильные права доступа
    permissions:
      contents: write
      actions: write  # Для удаления workflow runs
      
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id
    
    steps:
    - name: Checkout
      uses: actions/checkout@main
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Setup Python
      uses: actions/setup-python@v5  # Обновляем до v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq moreutils
        pip3 install pyyaml

    - name: Setup Git credentials
      uses: de-vri-es/setup-git-credentials@v2
      with:
        credentials: https://Dronnis:${{ secrets.TOKEN }}@github.com/

    - name: Set git identity
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: Run merge manager
      run: |
        chmod +x .github/scripts/*.sh
        .github/scripts/merge-manager.sh

    - name: SSH debug
      uses: kiddin9/debugger-action@master
      if: github.event.inputs.ssh == 'true'

    - name: Check for changes
      run: |
        echo "🔍 Checking for changes..."
        git status
        git diff --stat
        echo "Number of changed files: $(git status --porcelain | wc -l)"

    - name: Commit and push
      run: |
        cd "$GITHUB_WORKSPACE"
        
        # Добавляем все изменения
        git add .
        
        # Проверяем, есть ли изменения для коммита
        if git diff --cached --quiet; then
        echo "ℹ️ No changes to commit"
        else
        Emojis=("🎉" "🤞" "✨" "🎁" "🎈" "🎄" "🎨" "💋" "🍓" "🍕" "🚀" "🛸" "🌈" "🔥" "🐶" "🦄")
        git commit -m "${Emojis[$RANDOM % ${#Emojis[@]}]} Sync $(date +'%Y-%m-%d %H:%M:%S')"
        git push origin main
        echo "✅ Changes pushed successfully"
        fi

    - name: Cleanup workflow runs
      uses: Mattraks/delete-workflow-runs@main
      continue-on-error: true
      with:
        retain_days: 1
        keep_minimum_runs: 3
        token: ${{ secrets.TOKEN }}  # Явно передаем токен